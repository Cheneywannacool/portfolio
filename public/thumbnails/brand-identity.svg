<svg width="800" height="460" viewBox="0 0 800 460" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="460" fill="#2D3B42"/>

  <!-- Ambient peach glow -->
  <ellipse cx="200" cy="460" rx="300" ry="200" fill="rgba(253,241,238,0.04)"/>
  <ellipse cx="700" cy="0" rx="200" ry="140" fill="rgba(239,70,35,0.07)"/>

  <!-- Label -->
  <text x="48" y="54" font-family="'Helvetica Neue', sans-serif" font-size="11" font-weight="600" letter-spacing="0.12em" fill="rgba(239,70,35,0.65)">BRAND IDENTITY</text>

  <!-- Large wordmark -->
  <text x="48" y="156" font-family="Georgia, serif" font-style="italic" font-size="96" letter-spacing="-0.04em" fill="rgba(253,241,238,0.92)">Noun</text>
  <text x="48" y="210" font-family="Georgia, serif" font-style="italic" font-size="96" letter-spacing="-0.04em" fill="#EF4623">Studio</text>

  <!-- Tagline -->
  <text x="50" y="248" font-family="'Helvetica Neue', sans-serif" font-size="12" font-weight="300" letter-spacing="0.14em" fill="rgba(253,241,238,0.35)">DESIGN � BRANDING � STRATEGY</text>

  <!-- Divider -->
  <line x1="48" y1="268" x2="400" y2="268" stroke="rgba(253,241,238,0.08)" stroke-width="1"/>

  <!-- Color palette -->
  <circle cx="68" cy="310" r="26" fill="#EF4623"/>
  <circle cx="128" cy="310" r="26" fill="#2D3B42" stroke="rgba(253,241,238,0.15)" stroke-width="1"/>
  <circle cx="188" cy="310" r="26" fill="#FDF1EE"/>
  <circle cx="248" cy="310" r="26" fill="#F4694A"/>
  <circle cx="308" cy="310" r="26" fill="#3F5560"/>

  <text x="68" y="352" font-family="'Helvetica Neue', sans-serif" font-size="9" fill="rgba(253,241,238,0.3)" text-anchor="middle">#EF4623</text>
  <text x="128" y="352" font-family="'Helvetica Neue', sans-serif" font-size="9" fill="rgba(253,241,238,0.3)" text-anchor="middle">#2D3B42</text>
  <text x="188" y="352" font-family="'Helvetica Neue', sans-serif" font-size="9" fill="rgba(253,241,238,0.3)" text-anchor="middle">#FDF1EE</text>
  <text x="248" y="352" font-family="'Helvetica Neue', sans-serif" font-size="9" fill="rgba(253,241,238,0.3)" text-anchor="middle">#F4694A</text>
  <text x="308" y="352" font-family="'Helvetica Neue', sans-serif" font-size="9" fill="rgba(253,241,238,0.3)" text-anchor="middle">#3F5560</text>

  <!-- Type scale right side -->
  <g transform="translate(450, 75)">
    <text x="0" y="0" font-family="'Helvetica Neue', sans-serif" font-size="9" font-weight="600" letter-spacing="0.1em" fill="rgba(253,241,238,0.3)">TYPE SCALE</text>
    <line x1="0" y1="10" x2="310" y2="10" stroke="rgba(253,241,238,0.06)" stroke-width="1"/>

    <!-- Display -->
    <text x="0" y="65" font-family="Georgia, serif" font-style="italic" font-size="48" letter-spacing="-0.03em" fill="rgba(253,241,238,0.85)">Display</text>
    <text x="0" y="82" font-family="'Helvetica Neue', sans-serif" font-size="9" fill="rgba(253,241,238,0.2)" letter-spacing="0.06em">48px � Instrument Serif Italic</text>

    <line x1="0" y1="96" x2="310" y2="96" stroke="rgba(253,241,238,0.06)" stroke-width="1"/>

    <!-- Heading -->
    <text x="0" y="126" font-family="Georgia, serif" font-style="italic" font-size="28" letter-spacing="-0.02em" fill="rgba(253,241,238,0.6)">Heading</text>
    <text x="0" y="140" font-family="'Helvetica Neue', sans-serif" font-size="9" fill="rgba(253,241,238,0.2)" letter-spacing="0.06em">28px � Instrument Serif Italic</text>

    <line x1="0" y1="154" x2="310" y2="154" stroke="rgba(253,241,238,0.06)" stroke-width="1"/>

    <!-- Body -->
    <text x="0" y="178" font-family="'Helvetica Neue', sans-serif" font-size="16" font-weight="300" fill="rgba(253,241,238,0.45)">Body copy  Manrope 300</text>
    <text x="0" y="194" font-family="'Helvetica Neue', sans-serif" font-size="9" fill="rgba(253,241,238,0.2)" letter-spacing="0.06em">18px � Manrope Light</text>

    <line x1="0" y1="208" x2="310" y2="208" stroke="rgba(253,241,238,0.06)" stroke-width="1"/>

    <!-- Label -->
    <text x="0" y="228" font-family="'Helvetica Neue', sans-serif" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#EF4623">LABEL / CAPTION</text>
    <text x="0" y="244" font-family="'Helvetica Neue', sans-serif" font-size="9" fill="rgba(253,241,238,0.2)" letter-spacing="0.06em">11px � Manrope 600 � 0.12em tracked</text>
  </g>

  <!-- Logo mark bottom left -->
  <g transform="translate(48, 375)">
    <circle cx="30" cy="30" r="30" fill="#EF4623"/>
    <path d="M16 30 Q30 14 44 30 Q30 46 16 30Z" fill="white"/>
  </g>

  <!-- Sticker / usage example bottom -->
  <rect x="108" y="365" width="220" height="60" rx="16" fill="rgba(239,70,35,0.08)" stroke="rgba(239,70,35,0.15)" stroke-width="1"/>
  <text x="128" y="390" font-family="Georgia, serif" font-style="italic" font-size="18" fill="rgba(253,241,238,0.7)">Noun Studio</text>
  <text x="128" y="408" font-family="'Helvetica Neue', sans-serif" font-size="9" letter-spacing="0.1em" fill="rgba(253,241,238,0.3)">DESIGN & STRATEGY</text>
</svg>
